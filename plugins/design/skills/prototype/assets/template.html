<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ---------- Design tokens ---------- */
      :root {
        /* Color — neutral light palette. Replace with brand if specified. */
        --bg: #fafaf9;
        --surface: #ffffff;
        --surface-2: #f5f5f4;
        --border: #e7e5e4;
        --border-strong: #d6d3d1;
        --text: #1c1917;
        --text-muted: #57534e;
        --text-subtle: #78716c;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --accent-soft: #dbeafe;
        --success: #16a34a;
        --success-soft: #dcfce7;
        --success-strong: #166534;
        --warning: #d97706;
        --warning-soft: #fef3c7;
        --warning-strong: #92400e;
        --danger: #dc2626;
        --danger-soft: #fee2e2;
        --danger-strong: #991b1b;

        /* Type */
        --font-sans:
          'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        --font-mono: ui-monospace, 'SF Mono', Menlo, Monaco, Consolas, monospace;

        /* Scale */
        --text-xs: 0.75rem;
        --text-sm: 0.875rem;
        --text-base: 1rem;
        --text-lg: 1.125rem;
        --text-xl: 1.25rem;
        --text-2xl: 1.5rem;
        --text-3xl: 1.875rem;
        --text-4xl: 2.25rem;

        /* Space */
        --space-1: 0.25rem;
        --space-2: 0.5rem;
        --space-3: 0.75rem;
        --space-4: 1rem;
        --space-5: 1.25rem;
        --space-6: 1.5rem;
        --space-8: 2rem;
        --space-10: 2.5rem;
        --space-12: 3rem;
        --space-16: 4rem;

        /* Radius */
        --radius-sm: 4px;
        --radius: 8px;
        --radius-lg: 12px;
        --radius-xl: 16px;
        --radius-full: 9999px;

        /* Shadow */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
        --shadow:
          0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
        --shadow-lg:
          0 10px 15px -3px rgba(0, 0, 0, 0.08),
          0 4px 6px -4px rgba(0, 0, 0, 0.04);

        /* Motion */
        --ease: cubic-bezier(0.4, 0, 0.2, 1);
        --duration: 180ms;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0c0a09;
          --surface: #1c1917;
          --surface-2: #292524;
          --border: #292524;
          --border-strong: #44403c;
          --text: #fafaf9;
          --text-muted: #d6d3d1;
          --text-subtle: #a8a29e;
          --accent: #60a5fa;
          --accent-hover: #93c5fd;
          --accent-soft: #1e3a8a;
          --success-soft: #052e16;
          --success-strong: #86efac;
          --warning-soft: #451a03;
          --warning-strong: #fcd34d;
          --danger-soft: #450a0a;
          --danger-strong: #fca5a5;
          --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
          --shadow:
            0 1px 3px rgba(0, 0, 0, 0.5), 0 1px 2px rgba(0, 0, 0, 0.4);
          --shadow-lg:
            0 10px 15px -3px rgba(0, 0, 0, 0.6),
            0 4px 6px -4px rgba(0, 0, 0, 0.4);
        }
      }

      /* ---------- Reset ---------- */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        font-size: var(--text-base);
        line-height: 1.5;
        color: var(--text);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        margin: 0;
        font-weight: 600;
        line-height: 1.2;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0;
      }
      img,
      svg {
        display: block;
        max-width: 100%;
      }
      button {
        font: inherit;
        cursor: pointer;
        border: 0;
        background: none;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      input,
      select,
      textarea {
        font: inherit;
      }

      /* ---------- Primitives ---------- */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: var(--space-2);
        padding: var(--space-2) var(--space-4);
        border-radius: var(--radius);
        font-size: var(--text-sm);
        font-weight: 500;
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border-strong);
        transition: all var(--duration) var(--ease);
      }
      .btn:hover {
        background: var(--surface-2);
      }
      .btn:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .btn-primary:hover {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm);
      }
      .input {
        width: 100%;
        padding: var(--space-2) var(--space-3);
        border-radius: var(--radius);
        border: 1px solid var(--border-strong);
        background: var(--surface);
        color: var(--text);
        transition: border-color var(--duration) var(--ease);
      }
      .input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      /* ---------- App-specific styles below ---------- */
      /* Replace and extend with actual prototype styles */
    </style>
  </head>
  <body>

</html>
